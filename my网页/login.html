<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 个人主页</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

    <!-- ==================== 认证卡片容器 ==================== -->
    <div class="auth-card">
        <h1 class="auth-card__title">👋 欢迎</h1>
        <p class="auth-card__subtitle">登录或注册以继续访问</p>

        <!-- ===== 错误提示区 ===== -->
        <div class="auth-card__msg auth-card__msg--error" id="authError" style="display:none;"></div>
        <div class="auth-card__msg auth-card__msg--success" id="authSuccess" style="display:none;"></div>

        <!-- ==================== 登录表单 ==================== -->
        <form class="auth-card__form" id="loginForm">
            <input
                type="text"
                class="auth-card__input"
                id="loginUsername"
                placeholder="用户名"
                autocomplete="username"
                maxlength="30"
                required
            >
            <input
                type="password"
                class="auth-card__input"
                id="loginPassword"
                placeholder="密码"
                autocomplete="current-password"
                required
            >
            <button type="submit" class="btn btn--primary auth-card__btn" id="loginBtn">
                登 录
            </button>
        </form>

        <!-- ==================== 注册表单（默认隐藏） ==================== -->
        <form class="auth-card__form" id="registerForm" style="display:none;">
            <input
                type="text"
                class="auth-card__input"
                id="regUsername"
                placeholder="用户名（3-30位，字母数字下划线）"
                autocomplete="username"
                maxlength="30"
                required
            >
            <input
                type="password"
                class="auth-card__input"
                id="regPassword"
                placeholder="密码（至少6位）"
                autocomplete="new-password"
                required
            >
            <input
                type="password"
                class="auth-card__input"
                id="regConfirm"
                placeholder="确认密码"
                autocomplete="new-password"
                required
            >
            <button type="submit" class="btn btn--primary auth-card__btn" id="regBtn">
                注 册
            </button>
        </form>

        <!-- ===== 切换链接 ===== -->
        <p class="auth-card__toggle">
            <span id="toggleText">还没有账号？</span>
            <a href="#" id="toggleLink">立即注册</a>
        </p>
    </div>

    <!-- 引入认证库 -->
    <script src="auth.js"></script>

    <!-- ==================== 页面逻辑 ==================== -->
    <script>
        (function () {
            // ---------- DOM 引用 ----------
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const toggleText = document.getElementById('toggleText');
            const toggleLink = document.getElementById('toggleLink');
            const errorEl = document.getElementById('authError');
            const successEl = document.getElementById('authSuccess');
            const loginBtn = document.getElementById('loginBtn');
            const regBtn = document.getElementById('regBtn');

            // 当前模式：'login' 或 'register'
            let mode = 'login';

            // ---------- 页面加载：已登录则直接跳转 ----------
            (async () => {
                if (Auth.isLoggedIn()) {
                    const result = await Auth.verify();
                    if (result.valid) {
                        window.location.href = '/index.html';
                        return;
                    }
                }
            })();

            // ---------- 工具函数 ----------
            /** 显示提示信息 */
            function showMsg(type, message) {
                const el = type === 'error' ? errorEl : successEl;
                const other = type === 'error' ? successEl : errorEl;
                other.style.display = 'none';
                el.textContent = message;
                el.style.display = 'block';
            }

            /** 隐藏所有提示 */
            function hideMsgs() {
                errorEl.style.display = 'none';
                successEl.style.display = 'none';
            }

            /** 设置按钮 loading 状态 */
            function setLoading(btn, loading) {
                if (loading) {
                    btn.dataset.origText = btn.textContent;
                    btn.textContent = '处理中...';
                    btn.disabled = true;
                } else {
                    btn.textContent = btn.dataset.origText || btn.textContent;
                    btn.disabled = false;
                }
            }

            // ---------- 登录/注册切换 ----------
            toggleLink.addEventListener('click', (e) => {
                e.preventDefault();
                hideMsgs();
                if (mode === 'login') {
                    // 切换到注册
                    loginForm.style.display = 'none';
                    registerForm.style.display = '';
                    toggleText.textContent = '已有账号？';
                    toggleLink.textContent = '立即登录';
                    mode = 'register';
                } else {
                    // 切换到登录
                    registerForm.style.display = 'none';
                    loginForm.style.display = '';
                    toggleText.textContent = '还没有账号？';
                    toggleLink.textContent = '立即注册';
                    mode = 'login';
                }
            });

            // ---------- 登录表单提交 ----------
            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                hideMsgs();

                const username = document.getElementById('loginUsername').value.trim();
                const password = document.getElementById('loginPassword').value;

                if (!username || !password) {
                    showMsg('error', '请填写用户名和密码');
                    return;
                }

                setLoading(loginBtn, true);
                const result = await Auth.login(username, password);
                setLoading(loginBtn, false);

                if (result.ok) {
                    window.location.href = '/index.html';
                } else {
                    showMsg('error', result.error || '登录失败，请重试');
                }
            });

            // ---------- 注册表单提交 ----------
            registerForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                hideMsgs();

                const username = document.getElementById('regUsername').value.trim();
                const password = document.getElementById('regPassword').value;
                const confirm = document.getElementById('regConfirm').value;

                // 客户端校验
                if (!username || !password || !confirm) {
                    showMsg('error', '请填写所有字段');
                    return;
                }
                if (username.length < 3) {
                    showMsg('error', '用户名至少 3 个字符');
                    return;
                }
                if (!username.replace(/_/g, '').match(/^[a-zA-Z0-9]+$/)) {
                    showMsg('error', '用户名只能包含字母、数字和下划线');
                    return;
                }
                if (password.length < 6) {
                    showMsg('error', '密码至少 6 个字符');
                    return;
                }
                if (password !== confirm) {
                    showMsg('error', '两次密码输入不一致');
                    return;
                }

                setLoading(regBtn, true);
                const result = await Auth.register(username, password);
                setLoading(regBtn, false);

                if (result.ok) {
                    showMsg('success', '注册成功！请切换到登录表单进行登录。');
                    registerForm.reset();
                    // 自动切换到登录模式
                    toggleLink.click();
                } else {
                    showMsg('error', result.error || '注册失败，请重试');
                }
            });
        })();
    </script>
</body>
</html>
